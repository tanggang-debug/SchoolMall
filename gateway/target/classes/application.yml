server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: mall-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/**

logging:
  level:
    org.springframework.cloud.gateway: INFO
